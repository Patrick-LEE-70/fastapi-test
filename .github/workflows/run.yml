name: Simple Python Run

on:
  workflow_dispatch: # 이 설정이 있어야 수동으로 실행 버튼이 생깁니다.

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # 내 코드를 가져옵니다.

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: python main.py # 실행할 파일명을 적으세요.
